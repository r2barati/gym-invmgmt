name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11"]

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with ruff
      run: ruff check gym_invmgmt/ tests/

    - name: Check formatting with black
      run: black --check gym_invmgmt/ tests/

    - name: Run tests
      run: pytest tests/ -q

    - name: Run Gymnasium env checker
      run: |
        python -c "
        import gymnasium, gym_invmgmt
        from gymnasium.utils.env_checker import check_env
        for env_id in ['GymInvMgmt/MultiEchelon-v0', 'GymInvMgmt/Serial-v0']:
            env = gymnasium.make(env_id)
            check_env(env.unwrapped, skip_render_check=True)
            print(f'{env_id}: PASSED')
        "
